name: Confluence Sync

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  AWS_REGION: eu-west-1
  CENTRAL_SECRET_ID: essensys-feature-lifecycle
  IAM_ROLE: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.GITHUB_ACTIONS_ROLE }}
  CONFLUENCE_PAGE_URL_PREFIX: https://${{ vars.ATLASSIAN_ORG }}.atlassian.net/wiki/spaces/${{ vars.CONFLUENCE_SPACE_KEY }}/pages

jobs:
  draft-on-pr:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Confluence credentials
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value \
            --secret-id "$CENTRAL_SECRET_ID" \
            --query SecretString --output text > /tmp/secret.json
          export_from_secret() {
            local env_name="$1"
            local key_name="$2"
            local value
            value="$(jq -r --arg k "$key_name" '.[$k] // empty' /tmp/secret.json)"
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
              echo "$env_name=$value" >> "$GITHUB_ENV"
            fi
          }
          export_from_secret CONFLUENCE_ACCOUNT CONFLUENCE_ACCOUNT
          export_from_secret CONFLUENCE_ACCOUNT ATLASSIAN_ACCOUNT
          export_from_secret CONFLUENCE_TOKEN CONFLUENCE_TOKEN
          export_from_secret CONFLUENCE_TOKEN ATLASSIAN_TOKEN
          export_from_secret CONFLUENCE_CLOUD_ID CONFLUENCE_CLOUD_ID
          export_from_secret CONFLUENCE_CLOUD_ID ATLASSIAN_CLOUD_ID
          rm -f /tmp/secret.json

      - name: Install Confluence sync dependencies
        run: python3 -m pip install --disable-pip-version-check markdown requests

      - name: Select impacted manifests
        id: select
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tr '\n' ' ')"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          python3 scripts/feature_lifecycle/select_feature_manifests.py $changed > /tmp/manifests.txt
          if [ -s /tmp/manifests.txt ]; then
            echo "has_manifests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update draft pages
        if: steps.select.outputs.has_manifests == 'true'
        id: draft
        run: |
          set -euo pipefail
          : > /tmp/confluence-links.md
          while IFS= read -r manifest; do
            [ -n "$manifest" ] || continue
            page_id="$(python3 scripts/feature_lifecycle/confluence_sync.py draft \
              --manifest "$manifest" \
              --pr-number "${{ github.event.pull_request.number }}" \
              --branch "${{ github.event.pull_request.head.ref }}")"
            if [ "$page_id" = "SKIP" ]; then
              echo "- \`$manifest\` -> skipped (user guide page not in this repository)" >> /tmp/confluence-links.md
              continue
            fi
            echo "- \`$manifest\` -> ${CONFLUENCE_PAGE_URL_PREFIX}/${page_id}" >> /tmp/confluence-links.md
          done < /tmp/manifests.txt

      - name: Commit updated manifest page ids
        if: steps.select.outputs.has_manifests == 'true'
        run: |
          if git diff --quiet -- features/*.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add features/*.json
          git commit -m "ci(confluence): sync draft page ids for PR #${{ github.event.pull_request.number }}"
          git push

      - name: Comment PR with draft links
        if: steps.select.outputs.has_manifests == 'true'
        uses: actions/github-script@v7
        env:
          LINK_FILE: /tmp/confluence-links.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const marker = "<!-- confluence-sync -->";
            const links = fs.readFileSync(process.env.LINK_FILE, "utf8");
            const body = `${marker}\n# Confluence Draft Sync\n\n${links}`;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

  promote-on-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Confluence credentials
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value \
            --secret-id "$CENTRAL_SECRET_ID" \
            --query SecretString --output text > /tmp/secret.json
          for pair in \
            "CONFLUENCE_ACCOUNT CONFLUENCE_ACCOUNT" \
            "CONFLUENCE_TOKEN CONFLUENCE_TOKEN" \
            "CONFLUENCE_CLOUD_ID CONFLUENCE_CLOUD_ID"; do
            env_name="${pair%% *}"
            key_name="${pair##* }"
            value="$(jq -r --arg k "$key_name" '.[$k] // empty' /tmp/secret.json)"
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
              echo "$env_name=$value" >> "$GITHUB_ENV"
            fi
          done
          rm -f /tmp/secret.json

      - name: Install Confluence sync dependencies
        run: python3 -m pip install --disable-pip-version-check markdown requests

      - name: Select impacted manifests
        id: select
        run: |
          changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | tr '\n' ' ')"
          python3 scripts/feature_lifecycle/select_feature_manifests.py $changed > /tmp/manifests.txt
          if [ -s /tmp/manifests.txt ]; then
            echo "has_manifests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote draft pages
        if: steps.select.outputs.has_manifests == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            [ -n "$manifest" ] || continue
            result="$(python3 scripts/feature_lifecycle/confluence_sync.py promote --manifest "$manifest")"
            if [ "$result" = "SKIP" ]; then
              echo "Skipped promote for $manifest (user guide page not in this repository)"
              continue
            fi
          done < /tmp/manifests.txt

      - name: Commit published page ids
        if: steps.select.outputs.has_manifests == 'true'
        run: |
          if git diff --quiet -- features/*.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add features/*.json
          git commit -m "ci(confluence): promote published page ids"
          git push

  purge-abandoned-drafts:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Confluence credentials
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value \
            --secret-id "$CENTRAL_SECRET_ID" \
            --query SecretString --output text > /tmp/secret.json
          for pair in \
            "CONFLUENCE_ACCOUNT CONFLUENCE_ACCOUNT" \
            "CONFLUENCE_TOKEN CONFLUENCE_TOKEN" \
            "CONFLUENCE_CLOUD_ID CONFLUENCE_CLOUD_ID"; do
            env_name="${pair%% *}"
            key_name="${pair##* }"
            value="$(jq -r --arg k "$key_name" '.[$k] // empty' /tmp/secret.json)"
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
              echo "$env_name=$value" >> "$GITHUB_ENV"
            fi
          done
          rm -f /tmp/secret.json

      - name: Install Confluence sync dependencies
        run: python3 -m pip install --disable-pip-version-check markdown requests

      - name: Select impacted manifests
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | tr '\n' ' ')"
          python3 scripts/feature_lifecycle/select_feature_manifests.py $changed > /tmp/manifests.txt

      - name: Delete abandoned draft pages
        run: |
          set -euo pipefail
          if [ ! -s /tmp/manifests.txt ]; then
            exit 0
          fi
          while IFS= read -r manifest; do
            [ -n "$manifest" ] || continue
            python3 scripts/feature_lifecycle/confluence_sync.py delete-draft --manifest "$manifest"
          done < /tmp/manifests.txt
